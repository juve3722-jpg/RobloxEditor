<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic Pong Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #111;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    h1 {
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    #game-container {
      position: relative;
      border: 4px solid #fff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    canvas {
      background-color: #000;
      display: block;
    }

    .instructions {
      margin-top: 15px;
      color: #aaa;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>PONG</h1>
  <div id="game-container">
    <canvas id="pongCanvas" width="800" height="500"></canvas>
  </div>
  <p class="instructions">Controls: Move **Mouse** over canvas or use **Up/Down Arrow Keys**</p>

  <script>
    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');

    // Game Objects
    const PADDLE_WIDTH = 12;
    const PADDLE_HEIGHT = 90;
    const BALL_SIZE = 10;
    const PADDLE_SPEED = 7;

    let player = {
      x: 15,
      y: canvas.height / 2 - PADDLE_HEIGHT / 2,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      score: 0,
      dy: 0
    };

    let ai = {
      x: canvas.width - 15 - PADDLE_WIDTH,
      y: canvas.height / 2 - PADDLE_HEIGHT / 2,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      score: 0,
      speed: 4.5 // AI smooth tracking speed
    };

    let ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      size: BALL_SIZE,
      speedX: 5,
      speedY: 3,
      baseSpeed: 5
    };

    // Keyboard controls tracking
    const keys = {
      ArrowUp: false,
      ArrowDown: false
    };

    // Event Listeners
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        keys[e.key] = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        keys[e.key] = false;
      }
    });

    // Mouse movement control
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mouseY = e.clientY - rect.top;
      // Center the paddle on the mouse position
      player.y = mouseY - player.height / 2;
    });

    // Reset ball to center after a point
    function resetBall(direction = 1) {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.speedX = ball.baseSpeed * direction;
      // Randomize initial vertical trajectory slightly
      ball.speedY = (Math.random() * 4 - 2) * 2;
    }

    // AABB Collision Detection Helper
    function checkCollision(b, p) {
      return (
        b.x - b.size < p.x + p.width &&
        b.x + b.size > p.x &&
        b.y - b.size < p.y + p.height &&
        b.y + b.size > p.y
      );
    }

    // Update Game State
    function update() {
      // 1. Player Keyboard Movement
      if (keys.ArrowUp) {
        player.y -= PADDLE_SPEED;
      }
      if (keys.ArrowDown) {
        player.y += PADDLE_SPEED;
      }

      // Clamp Player paddle within boundaries
      player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

      // 2. AI Movement (Tracks ball center)
      const aiCenter = ai.y + ai.height / 2;
      if (aiCenter < ball.y - 15) {
        ai.y += ai.speed;
      } else if (aiCenter > ball.y + 15) {
        ai.y -= ai.speed;
      }
      // Clamp AI paddle within boundaries
      ai.y = Math.max(0, Math.min(canvas.height - ai.height, ai.y));

      // 3. Move Ball
      ball.x += ball.speedX;
      ball.y += ball.speedY;

      // 4. Wall Collisions (Top & Bottom)
      if (ball.y - ball.size <= 0 || ball.y + ball.size >= canvas.height) {
        ball.speedY *= -1; // Bounce off top/bottom
      }

      // 5. Paddle Collisions
      let activePaddle = ball.x < canvas.width / 2 ? player : ai;

      if (checkCollision(ball, activePaddle)) {
        // Calculate hit point relative to paddle center (-1 to 1)
        const paddleCenter = activePaddle.y + activePaddle.height / 2;
        const hitPoint = (ball.y - paddleCenter) / (activePaddle.height / 2);

        // Angle calculation (max 45-degree bounce)
        const bounceAngle = hitPoint * (Math.PI / 4);

        // Increase speed slightly with each paddle hit
        const currentSpeed = Math.sqrt(ball.speedX * ball.speedX + ball.speedY * ball.speedY) + 0.3;

        // Determine horizontal bounce direction
        const direction = ball.x < canvas.width / 2 ? 1 : -1;
        ball.speedX = direction * currentSpeed * Math.cos(bounceAngle);
        ball.speedY = currentSpeed * Math.sin(bounceAngle);
      }

      // 6. Scoring Detection
      if (ball.x - ball.size < 0) {
        // AI scores
        ai.score++;
        resetBall(1);
      } else if (ball.x + ball.size > canvas.width) {
        // Player scores
        player.score++;
        resetBall(-1);
      }
    }

    // Render Canvas Components
    function draw() {
      // Clear screen
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw Center Net
      ctx.strokeStyle = '#fff';
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]); // Reset line style

      // Draw Scoreboard
      ctx.fillStyle = '#fff';
      ctx.font = '36px "Courier New", monospace';
      ctx.fillText(player.score, canvas.width / 4, 50);
      ctx.fillText(ai.score, (3 * canvas.width) / 4, 50);

      // Draw Paddles
      ctx.fillRect(player.x, player.y, player.width, player.height);
      ctx.fillRect(ai.x, ai.y, ai.width, ai.height);

      // Draw Ball
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
      ctx.fill();
    }

    // Main Game Loop
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Start Game
    gameLoop();
  </script>
</body>
</html>
